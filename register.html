<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Monitoring Ketinggian Air Bendungan Berbasis IoT</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Toast Notification -->
  <div id="toast" class="alert-popup">
    <i id="toastIcon" class="fa-solid"></i>
    <span id="toastMessage"></span>
  </div>

  <div class="auth-wrapper">
    <!-- Decorative background elements -->
    <div class="auth-bg-deco top-left"></div>
    <div class="auth-bg-deco bottom-right"></div>

    <!-- Theme Switcher floating in top right -->
    <div style="position: absolute; top: 25px; right: 25px; z-index: 10;">
      <button class="theme-toggle" onclick="toggleTheme()" title="Ubah Tema">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>

    <div class="auth-card glass-card">
      <div class="auth-header">
        <i class="fa-solid fa-droplet app-icon"></i>
        <h1>Daftar Akun Baru</h1>
        <p>Registrasi Pengguna IoT</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="input-container">
          <i class="fa-solid fa-user input-icon"></i>
          <input type="text" id="username" placeholder="Buat Username baru" autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-container">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" id="password" placeholder="Buat Password baru" autocomplete="new-password">
          <i class="fa-regular fa-eye password-toggle" onclick="togglePassword('password', 'passwordEye')" id="passwordEye"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Konfirmasi Password</label>
        <div class="input-container">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" id="confirmPassword" placeholder="Ulangi Password baru" autocomplete="new-password">
          <i class="fa-regular fa-eye password-toggle" onclick="togglePassword('confirmPassword', 'confirmPasswordEye')" id="confirmPasswordEye"></i>
        </div>
      </div>

      <button class="btn-primary" onclick="register()">
        Daftar Sekarang <i class="fa-solid fa-user-plus"></i>
      </button>

      <div class="auth-footer">
        Sudah punya akun? <a href="index.html">Masuk di sini</a>
      </div>
    </div>
  </div>

<script>
  // Theme Initialization & Logic
  const savedTheme = localStorage.getItem("theme") || "light";
  document.documentElement.setAttribute("data-theme", savedTheme);
  
  document.addEventListener("DOMContentLoaded", () => {
    const icon = document.querySelector(".theme-toggle i");
    if (savedTheme === "dark") {
      icon.className = "fa-solid fa-sun";
    } else {
      icon.className = "fa-solid fa-moon";
    }
  });

  function toggleTheme() {
    const currentTheme = document.documentElement.getAttribute("data-theme");
    const nextTheme = currentTheme === "dark" ? "light" : "dark";
    
    document.documentElement.setAttribute("data-theme", nextTheme);
    localStorage.setItem("theme", nextTheme);
    
    const icon = document.querySelector(".theme-toggle i");
    icon.className = nextTheme === "dark" ? "fa-solid fa-sun" : "fa-solid fa-moon";
  }

  // Toast alert system
  function showToast(message, type = "success") {
    const toast = document.getElementById("toast");
    const toastIcon = document.getElementById("toastIcon");
    const toastMessage = document.getElementById("toastMessage");

    toastMessage.innerText = message;
    
    toast.className = "alert-popup";
    toastIcon.className = "fa-solid";

    if (type === "success") {
      toast.classList.add("success");
      toastIcon.classList.add("fa-circle-check");
    } else {
      toast.classList.add("danger");
      toastIcon.classList.add("fa-circle-xmark");
    }

    toast.classList.add("show");

    setTimeout(() => {
      toast.classList.remove("show");
    }, 3000);
  }

  // Toggle single password visibility
  function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const eye = document.getElementById(iconId);
    
    if (input.type === "password") {
      input.type = "text";
      eye.className = "fa-regular fa-eye-slash password-toggle";
    } else {
      input.type = "password";
      eye.className = "fa-regular fa-eye password-toggle";
    }
  }
</script>

<!-- Firebase SDK V8 Compat (Works locally on file:// protocol without CORS blocking) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCLu-MifEZsFNFyiB3KTINe7kPadh6CPOE",
    authDomain: "monitoringair-37c90.firebaseapp.com",
    databaseURL: "https://monitoringair-37c90-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "monitoringair-37c90",
    storageBucket: "monitoringair-37c90.firebasestorage.app",
    messagingSenderId: "834586591493",
    appId: "1:834586591493:web:c5acc63ebf14aff8c1f76c",
    measurementId: "G-65DR1XRQHC"
  };

  // Initialize Firebase
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const db = firebase.database();
</script>

<script>
  // Registration process
  async function register() {
    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();
    let confirmPassword = document.getElementById("confirmPassword").value.trim();

    if (!username || !password || !confirmPassword) {
      showToast("Semua data harus diisi!", "danger");
      return;
    }

    if (password.length < 5) {
      showToast("Password minimal 5 karakter!", "danger");
      return;
    }

    if (password !== confirmPassword) {
      showToast("Konfirmasi password tidak cocok!", "danger");
      return;
    }

    try {
      // Cek apakah username sudah ada di database Firebase
      const snapshot = await db.ref("/users/" + username).once("value");
      if (snapshot.exists()) {
        showToast("Username sudah digunakan!", "danger");
        return;
      }

      // Simpan data user baru ke Firebase
      await db.ref("/users/" + username).set({
        username: username,
        password: password
      });

      // Tetap simpan ke localStorage untuk fallback/kecocokan kode lama jika diperlukan
      localStorage.setItem("username", username);
      localStorage.setItem("password", password);

      showToast("Registrasi berhasil! Mengalihkan ke login...", "success");

      setTimeout(() => {
        window.location.href = "index.html";
      }, 1500);

    } catch (error) {
      console.error("Firebase register error: ", error);
      showToast("Gagal menyimpan akun ke Firebase: " + error.message, "danger");
    }
  }
</script>

</body>
</html>
